name: CI

on:
  push:
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Run Python test suite
        run: pytest -q

  c-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [fastcapture, fastdet]
    steps:
      - uses: actions/checkout@v4
      - name: Install C dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential pkg-config libfftw3-dev libvolk2-dev libairspy-dev
      - name: Configure ${{ matrix.target }}
        run: cmake -S ${{ matrix.target }} -B build/${{ matrix.target }}
      - name: Build ${{ matrix.target }}
        run: cmake --build build/${{ matrix.target }} --config Release -j
      - name: Smoke-check binary output
        run: |
          if [ -f build/${{ matrix.target }}/fastcapture ]; then build/${{ matrix.target }}/fastcapture --help >/dev/null || true; fi
          if [ -f build/${{ matrix.target }}/fastdet ]; then build/${{ matrix.target }}/fastdet --help >/dev/null || true; fi
