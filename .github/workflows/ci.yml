name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,analysis]'
      - name: Run ruff (style + dead code)
        run: ruff check thriftyx/ tests/
      - name: Run mypy (static type check)
        run: mypy thriftyx/

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,analysis]'
      - name: Run Python test suite
        run: pytest -q

  c-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # fastdet is temporarily disabled: it depends on fastcapture being
        # installed at /usr/include/fastcard/<header>.h and linked as
        # libfastcard.a, but the current fastcapture install layout uses
        # libfastcapture.a and a flat header layout. Restoring the fastdet
        # build needs a coordinated rename across:
        #   - fastcapture/CMakeLists.txt install rules (headers and library)
        #   - fastdet/cmake/Modules/FindFastcard.cmake (library/header names)
        #   - the workflow (build+install fastcapture before configuring fastdet)
        # Tracked as a separate follow-up. fastcapture stays in the matrix
        # so Airspy-side C changes still get smoke-built.
        target: [fastcapture]
    steps:
      - uses: actions/checkout@v4
      - name: Install C dependencies
        # libvolk-dev replaces libvolk2-dev on Ubuntu Noble (24.04). The pkg-
        # config interface (`pkg-config volk`) is unchanged, so the CMake
        # configuration still works as-is.
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential pkg-config libfftw3-dev libvolk-dev libairspy-dev
      - name: Configure ${{ matrix.target }}
        run: cmake -S ${{ matrix.target }} -B build/${{ matrix.target }}
      - name: Build ${{ matrix.target }}
        run: cmake --build build/${{ matrix.target }} --config Release -j
      - name: Smoke-check binary output
        run: |
          if [ -f build/${{ matrix.target }}/fastcapture ]; then build/${{ matrix.target }}/fastcapture --help >/dev/null || true; fi
