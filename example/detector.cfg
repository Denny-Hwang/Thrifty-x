# Thrifty-X Detector Configuration
# Supports: RTL-SDR (8-bit), Airspy Mini (12-bit), Airspy R2 (12-bit)

rxid:               0

# === Device Settings ===
# device_type: rtlsdr / airspy_mini / airspy_r2
device_type:        rtlsdr
bit_depth:          8

# === Sampling & Frequency ===
# RTL-SDR:     2.4M (common), 2.048M, 1.92M, etc.
# Airspy Mini: 3M, 6M
# Airspy R2:   2.5M, 10M
sample_rate:        2.4M
chip_rate:          0.999707M

# Tuner center frequency
# Example: 162.000 MHz for marine VHF, 433.83 MHz for ISM band
tuner_freq:         433.83M
tuner_gain:         0.0
capture_skip:       600

# === Block Parameters ===
# Block size must be a power of 2, and block_history must be >= template_len - 1.
# Additionally, block_size must be >= 2 * block_history so that each read
# provides enough new samples to fill the next history window.
# These values are auto-adjusted at runtime when too small for the sample rate.
#
# RTL-SDR  2.4M: template ~2455  -> block_history ~4910,  block_size 16384
# Airspy Mini 6M: template ~6139  -> block_history ~12278, block_size 32768
# Airspy R2  10M: template ~10232 -> block_history ~20464, block_size 65536
#
# For Airspy devices, use detector_r2.cfg or detector_mini.cfg instead.
block_size:         16384
block_history:      4920

# === Carrier Detection ===
# carrier_window: frequency bin range to search for carrier
# Example: bin 7-130 covers ~1kHz to ~19kHz offset @ 2.4M/16384
carrier_window:     7 - 130
carrier_threshold:  15 * snr

# === Correlation Detection ===
corr_threshold:     15 * snr
template:           template.npy

# === Signal Processing Algorithms ===
# freq_shift_method: integer (fast, 2x speed, ~1.07m RMSE) or
#                    time_domain (accurate, ~1.04m RMSE)
freq_shift_method:  integer

# soa_interpolation: parabolic / gaussian / none
# Paper results: parabolic and gaussian give equivalent accuracy (~0.52m)
soa_interpolation:  parabolic

# === Airspy-specific Settings ===
# For Airspy devices, use the dedicated config files:
#   cp detector_r2.cfg detector.cfg    (Airspy R2, 10 Msps)
#   cp detector_mini.cfg detector.cfg  (Airspy Mini, 6 Msps)
#
# Or uncomment and adjust the settings below.
#
# --- Airspy Mini (6 Msps) ---
# device_type:      airspy_mini
# bit_depth:        12
# sample_rate:      6M
# block_size:       32768
# block_history:    12278
# carrier_window:   6 - 103
# bias_tee:         false
# lna_gain:         14
# mixer_gain:       15
# vga_gain:         15
#
# --- Airspy R2 (10 Msps) ---
# device_type:      airspy_r2
# bit_depth:        12
# sample_rate:      10M
# block_size:       65536
# block_history:    20464
# carrier_window:   7 - 124
# bias_tee:         false
# lna_gain:         14
# mixer_gain:       15
# vga_gain:         15
