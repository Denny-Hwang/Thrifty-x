# Thrifty-X Detector Configuration — Airspy Mini (6 Msps)
#
# Pre-computed block parameters for Airspy Mini at 6 MHz sample rate.
# Auto-adjustment in settings.py will also produce these values, but
# having them explicit avoids any ambiguity.

rxid:               0

# === Device Settings ===
device_type:        airspy_mini
bit_depth:          12

# === Sampling & Frequency ===
sample_rate:        6M
chip_rate:          0.999707M

# Tuner center frequency — adjust for your TX
tuner_freq:         166M
capture_skip:       100

# === Airspy Mini Gain Stages ===
# LNA: 0-14, Mixer: 0-15, VGA: 0-15
lna_gain:           7
mixer_gain:         7
vga_gain:           7
bias_tee:           false

# === Block Parameters ===
# Computed for 6 Msps: template_len=6139, block_history=2*template
# block_size must be >= 2 * block_history to avoid history truncation
block_size:         32768
block_history:      12278

# === Carrier Detection ===
# carrier_window: bin range covering ~1 kHz to ~19 kHz at 183.1 Hz/bin
carrier_window:     6 - 103
carrier_threshold:  15 * snr

# === Correlation Detection ===
corr_threshold:     15 * snr
template:           template.npy

# === Signal Processing ===
freq_shift_method:  integer
soa_interpolation:  parabolic
